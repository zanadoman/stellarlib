name: GTest

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v6

      - name: Install prerequisites
        run: pacman -Syu --noconfirm cmake ninja clang lld sdl3 gtest valgrind

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja --toolchain cmake/x86_64-linux-gnu.cmake

      - name: Build tests
        run: cmake --build build -t tests

      - name: Run tests
        run: env DEBUGINFOD_URLS=https://debuginfod.archlinux.org valgrind build/tests

      - name: Build examples
        run: cmake --build build -t examples
