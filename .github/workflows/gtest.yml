name: GTest

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Install prerequisites
        run: pacman -Syu --noconfirm git cmake ninja clang lld valgrind

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake --preset x86_64-linux-gnu-release-vendored -DSDL_UNIX_CONSOLE_BUILD=ON

      - name: Build examples
        run: cmake --build build/x86_64-linux-gnu/release -t examples

      - name: Build tests
        run: cmake --build build/x86_64-linux-gnu/release -t tests

      - name: Run tests
        run: env DEBUGINFOD_URLS=https://debuginfod.archlinux.org valgrind build/x86_64-linux-gnu/release/tests
